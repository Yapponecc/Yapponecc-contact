<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapponecc 💗 Цели</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            /* Более глубокий и насыщенный градиент */
            background: linear-gradient(-45deg, #ff7eb3, #6a11cb, #ff4d94, #2575fc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Темная стеклянная карточка */
        .glass-card {
            background: rgba(0, 0, 0, 0.6); /* Темная подложка для глубины */
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            z-index: 10;
            position: relative;
        }

        /* Заголовки с тенями */
        h1 { font-size: 2.8rem; margin-bottom: 5px; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tagline { opacity: .9; margin-bottom: 20px; font-size: 0.95rem; color: #ffb7d5; font-weight: 600; }

        /* Блок Цели (темный контрастный) */
        .goal-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .goal-title { font-size: 0.85rem; font-weight: 600; color: #fff; margin-bottom: 8px; }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff7eb3, #ff4d94);
            width: 45%; /* Твой прогресс */
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(255, 126, 179, 0.6);
        }

        /* Аватар-блоб */
        .avatar-blob {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff7eb3, #70a1ff);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: blobFloat 3s ease-in-out infinite;
            display: flex; align-items: center; justify-content: center; font-size: 3rem;
        }

        @keyframes blobFloat { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        /* Кнопки */
        .buttons { display: flex; flex-direction: column; gap: 14px; width: 100%; }

        .buttons a {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.05); /* Темные в покое */
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            border-radius: 22px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
        }

        /* КОНТРАСТ ПРИ НАВЕДЕНИИ: Ярко-розовый */
        .buttons a:hover {
            transform: scale(1.02) translateY(-5px);
            background: #ff4d94; 
            border-color: #ff7eb3;
            box-shadow: 0 15px 30px rgba(255, 77, 148, 0.4);
        }

        .btn-content { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1.1rem; }
        .btn-sub { font-size: 0.75rem; opacity: 0.8; margin-left: 33px; font-weight: 400; color: #eee; }

        .buttons a:hover .btn-sub { color: #fff; opacity: 1; }

        /* Спец-стиль для стрима */
        .stream-btn {
            border: 1px solid #ff4d94 !important;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 148, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(255, 77, 148, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 148, 0); }
        }

        .sakura {
            position: fixed; top: -10%; pointer-events: none; z-index: 1;
        }

        footer { position: absolute; bottom: 15px; opacity: .5; font-size: .8rem; color: #fff; z-index: 5; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="avatar-blob">🌸</div>
        <h1>Yapponecc</h1>
        <p class="tagline">Welcome to my world ✨</p>

        <div class="goal-container">
            <div class="goal-title">Цель: 5000 подписчиков</div>
            <div class="progress-bar">
                <div class="progress-fill" style="width:45%"></div>
            </div>
        </div>

        <div class="buttons">
            <a href="https://www.tiktok.com/@yapponec?_r=1&_t=ZS-94FQa3ilFvM" class="stream-btn" target="_blank">
                <div class="btn-content"><i class="fa-solid fa-play"></i> Live Stream</div>
                <div class="btn-sub">Присоединяйся сейчас!</div>
            </a>

            <a href="https://t.me/+06kgQmNA1ypjOGFi" target="_blank">
                <div class="btn-content"><i class="fa-brands fa-telegram"></i> Telegram Канал</div>
                <div class="btn-sub">Мои мысли, новости и анонсы</div>
            </a>

            <a href="https://t.me/yappopec" target="_blank">
                <div class="btn-content"><i class="fa-solid fa-paper-plane"></i> Личный Telegram</div>
                <div class="btn-sub">Связаться со мной напрямую</div>
            </a>

            <a href="https://discord.com/users/yapponecc" target="_blank">
                <div class="btn-content"><i class="fa-brands fa-discord"></i> Личный Discord</div>
                <div class="btn-sub">Для общения и игр</div>
            </a>
        </div>
    </div>

    <footer>Created with 💗 by Yapponecc</footer>

    <script>
        function createSakura() {
            const leaf = document.createElement('div');
            leaf.classList.add('sakura');
            leaf.innerHTML = '🌸';
            leaf.style.left = Math.random() * 100 + 'vw';
            
            document.body.appendChild(leaf);
            
            const animation = leaf.animate([
                { transform: `translateY(-10vh) rotate(0deg)`, opacity: 0.8 },
                { transform: `translateY(110vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], {
                duration: Math.random() * 4000 + 6000,
                easing: 'linear'
            });

            animation.onfinish = () => { leaf.remove(); };
        }
        setInterval(createSakura, 500);
    </script>
</body>
</html>
