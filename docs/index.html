<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapponecc | Linktree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff9fc3, #a0d4ff);
            overflow: hidden;
            color: white;
        }

        /* Эффект стекла для карточки */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 10;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        .avatar-blob {
            width: 120px; height: 120px;
            background: radial-gradient(circle at 30% 30%, #ff9fc3, #a0d4ff);
            margin: 0 auto 20px;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255,159,195,0.5);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        h1 { font-size: 2.2rem; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .subtitle { opacity: 0.8; font-size: 0.9rem; margin-bottom: 30px; }

        /* Кнопки */
        .buttons { display: flex; flex-direction: column; gap: 15px; }
        .buttons a {
            text-decoration: none; color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 20px;
            display: flex; flex-direction: column; align-items: flex-start;
            transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .buttons a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.03) translateZ(20px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-title { font-weight: 600; display: flex; align-items: center; gap: 10px; font-size: 1rem; }
        .btn-sub { font-size: 0.75rem; opacity: 0.6; margin-left: 28px; }

        /* Музыка */
        .music-player {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
            background: rgba(255,255,255,0.2); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100; border: 1px solid rgba(255,255,255,0.3);
        }
        .playing i { animation: spin 3s linear infinite; color: #ff9fc3; }
        @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

        /* Эффекты (Сакура/Сердечки) */
        .sakura { position: absolute; top: -20px; animation: fall linear infinite; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        .heart { position: fixed; pointer-events: none; animation: heartOut 1s forwards; color: #ff9fc3; }
        @keyframes heartOut { to { transform: translateY(-50px) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <div class="music-player" id="musicBtn">
        <i class="fas fa-music"></i>
        <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    </div>

    <div class="glass-card" id="card">
        <div class="avatar-blob"></div>
        <h1>Yapponecc 💗</h1>
        <p class="subtitle">Content Creator from Kazakhstan</p>
