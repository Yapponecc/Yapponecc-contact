<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapponecc 💗 Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            background: linear-gradient(-45deg, #ff7eb3, #6a11cb, #ff4d94, #2575fc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 30px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            z-index: 10;
        }

        h1 { font-size: 2.2rem; margin-bottom: 5px; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tagline { opacity: .8; margin-bottom: 20px; font-size: 0.9rem; color: #ffb7d5; }

        /* МАЙНКРАФТ СТИЛЬ ДЛЯ ДОНАТОВ */
        .mc-style {
            font-family: 'Press Start 2P', cursive;
            background: #be0000 !important; /* Насыщенный красный */
            border: 4px solid #5d0000 !important;
            image-rendering: pixelated;
            margin-top: 10px;
            box-shadow: 0 6px 0 #5d0000;
            transform: scale(1);
        }

        .mc-style:hover {
            transform: translateY(-3px) !important;
            background: #ff0000 !important;
            box-shadow: 0 8px 0 #8a0000 !important;
        }

        .mc-style .btn-content {
            font-size: 0.7rem !important; /* Уменьшаем размер из-за специфики шрифта */
            text-transform: uppercase;
        }

        .mc-icon {
            width: 24px;
            height: 24px;
            image-rendering: pixelated;
        }

        /* Остальные кнопки */
        .buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .buttons a {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 18px;
            border-radius: 18px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .buttons a:hover:not(.mc-style) {
            background: rgba(255, 77, 148, 0.8);
            transform: translateX(5px);
        }

        .btn-content { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1rem; }
        .btn-sub { font-size: 0.7rem; opacity: 0.7; margin-left: 36px; }

        .avatar-blob {
            width: 90px; height: 90px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff7eb3, #70a1ff);
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
        }

        .sakura { position: fixed; top: -10%; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="avatar-blob">🌸</div>
        <h1>Yapponecc</h1>
        <p class="tagline">Support & Community ✨</p>

        <div class="buttons">
            <a href="https://www.donationalerts.com/r/yapponecc" class="mc-style" target="_blank">
                <div class="btn-content">
                    <img src="https://st.donationalerts.com/favicon.ico" class="mc-icon" alt="DA">
                    Donate Alerts
                </div>
                <div style="font-size: 10px; margin-top: 5px; margin-left: 36px; font-family: 'Poppins'">Поддержи стрим монетой!</div>
            </a>

            <a href="#" class="mc-style" onclick="alert('Kaspi Gold: ТВОЙ_НОМЕР')">
                <div class="btn-content">
                    <img src="https://kaspi.kz/img/favicon/apple-touch-icon.png" class="mc-icon" alt="Kaspi">
                    Kaspi Gold
                </div>
                <div style="font-size: 10px; margin-top: 5px; margin-left: 36px; font-family: 'Poppins'">Прямой перевод (Казахстан)</div>
            </a>

            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">

            <a href="https://t.me/+06kgQmNA1ypjOGFi" target="_blank">
                <div class="btn-content"><i class="fa-brands fa-telegram"></i> Telegram</div>
                <div class="btn-sub">Анонсы и новости</div>
            </a>

            <a href="https://www.tiktok.com/@yapponec" target="_blank">
                <div class="btn-content"><i class="fa-brands fa-tiktok"></i> TikTok</div>
                <div class="btn-sub">Мои нарезки тут</div>
            </a>
        </div>
    </div>

    <script>
        function createSakura() {
            const leaf = document.createElement('div');
            leaf.classList.add('sakura');
            leaf.innerHTML = '🌸';
            leaf.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(leaf);
            const animation = leaf.animate([
                { transform: `translateY(-10vh) rotate(0deg)`, opacity: 0.8 },
                { transform: `translateY(110vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], { duration: Math.random() * 3000 + 5000, easing: 'linear' });
            animation.onfinish = () => { leaf.remove(); };
        }
        setInterval(createSakura, 600);
    </script>
</body>
</html>
